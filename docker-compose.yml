version: '3.8'

services:
  db:
    image: postgis/postgis:14-3.3
    environment:
      POSTGRES_USER: shipuser
      POSTGRES_PASSWORD: shippass
      POSTGRES_DB: ship_route_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://shipuser:shippass@db:5432/ship_route_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./final_ship_routes.csv:/app/final_ship_routes.csv:ro
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
  redis_data:
